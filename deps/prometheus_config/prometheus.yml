global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['127.0.0.1:9093']

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['127.0.0.1:9090']

  - job_name: 'alertmanager'
    static_configs:
      - targets: ['127.0.0.1:9093']

  # Seatunnel 集群 targets 通过 HTTP SD 动态发现，由用户在 Prometheus 中添加：
  - job_name: 'seatunnel_engine_http'
    http_sd_configs:
    - url: ${SEATUNNELX_EXTERNAL_URL}/api/v1/monitoring/prometheus/discovery
      refresh_interval: 30s

